- id: recent-daily-revenue
  layer: capability
  question: What was daily revenue over the last 30 days?
  dry_run:
    llm_responses:
      - |
        ```sql
        SELECT DATE(o.created_at) AS day, SUM(oi.sale_price) AS revenue
        FROM `bigquery-public-data.thelook_ecommerce.orders` o
        JOIN `bigquery-public-data.thelook_ecommerce.order_items` oi ON o.order_id = oi.order_id
        WHERE o.created_at >= TIMESTAMP(DATE_SUB(CURRENT_DATE(), INTERVAL 30 DAY))
        GROUP BY day
        ORDER BY day
        LIMIT 30
        ```
      - Daily revenue was stable mid-month and picked up in the final week.
    bq_outcomes:
      - ok: true
        columns: [day, revenue]
        rows: [["2024-06-01", 4200], ["2024-06-30", 5100]]
    judge_score: 4
    judge_rationale: Summarizes recent daily revenue trend.
  expect:
    status: done
    sql_tables: [orders, order_items]
    report_must_contain: [daily, revenue]

