- id: average-order-value
  layer: capability
  question: What is our average order value?
  dry_run:
    llm_responses:
      - |
        ```sql
        SELECT AVG(order_total) AS average_order_value
        FROM (
          SELECT o.order_id, SUM(oi.sale_price) AS order_total
          FROM `bigquery-public-data.thelook_ecommerce.orders` o
          JOIN `bigquery-public-data.thelook_ecommerce.order_items` oi ON o.order_id = oi.order_id
          GROUP BY o.order_id
        )
        ```
      - Average order value is about $86, slightly above last quarter.
    bq_outcomes:
