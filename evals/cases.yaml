- id: monthly-revenue
  layer: capability
  question: What was our monthly revenue last year?
  dry_run:
    llm_responses:
      - |
        ```sql
        SELECT FORMAT_TIMESTAMP('%Y-%m', o.created_at) AS month, SUM(oi.sale_price) AS revenue
        FROM `bigquery-public-data.thelook_ecommerce.orders` o
        JOIN `bigquery-public-data.thelook_ecommerce.order_items` oi ON o.order_id = oi.order_id
        WHERE o.status = 'Complete'
        GROUP BY month
        ORDER BY month
        LIMIT 24
        ```
      - Monthly revenue rose steadily last year, with December as the strongest month.
    bq_outcomes:
      - ok: true
        columns: [month, revenue]
        rows: [["2024-01", 120000], ["2024-12", 145000]]
    judge_score: 4
    judge_rationale: Clear monthly revenue answer with a useful takeaway.
  expect:
    status: done
    sql_tables: [orders, order_items]
    query_ok: true
    query_empty: false
    report_must_contain: [revenue, month]

- id: top-customers-spend
  layer: capability
  question: Who are our top 10 customers by total spend?
  dry_run:
    llm_responses:
      - |
        ```sql
        SELECT u.id, SUM(oi.sale_price) AS total_spend
        FROM `bigquery-public-data.thelook_ecommerce.users` u
        JOIN `bigquery-public-data.thelook_ecommerce.orders` o ON u.id = o.user_id
        JOIN `bigquery-public-data.thelook_ecommerce.order_items` oi ON o.order_id = oi.order_id
        GROUP BY u.id
        ORDER BY total_spend DESC
        LIMIT 10
        ```
      - The top customers are concentrated in a small group with the highest spend above $2,000.
    bq_outcomes:
      - ok: true
        columns: [id, total_spend]
        rows: [[101, 2500], [102, 2200]]
    judge_score: 4
    judge_rationale: Answers who the top customers are with spend context.
  expect:
    status: done
    sql_tables: [users, orders, order_items]
    query_ok: true
    report_must_contain: [customer, spend]

- id: top-products-sales
